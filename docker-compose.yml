services:
  db:
    image: postgres:16-alpine
    container_name: bola-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bola
      POSTGRES_USER: bola
      POSTGRES_PASSWORD: bola
    ports:
      - "5432:5432"
    volumes:
      - bola_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bola -d bola"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bola-api
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://bola:bola@db:5432/bola?schema=public
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bola-web
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://bola:bola@db:5432/bola?schema=public
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_INTERNAL_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  bola_postgres_data: